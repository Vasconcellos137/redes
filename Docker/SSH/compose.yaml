services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # retorna V or F
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: src/backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports: 
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    build: src/frontend
    environment:
      BACKEND_URL: ${BACKEND_URL}
    ports: 
      - "8080:5000"
    depends_on:
      - backend

# Criando volume para persistência dos dados do banco de dados
volumes:
  db_data:


