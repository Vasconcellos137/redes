services:
  db:
    image: postgres:16-alpine 
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

# Criando volume para persistência dos dados do banco de dados
volumes:
  db_data:

#Lê a senha direto do arquivo .env, evitando expor a senha no compose.yaml

#fazer server subir p/ BD

#para executar -> docker compose up